{% extends "base.html" %}

{% block title %}Sign in - MemeVault{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Sign in</h1>
    <form method="post" class="form-stack">
      {% csrf_token %}
      {% if form.errors %}
        <div class="message error">Invalid username or password.</div>
      {% endif %}
      <label>
        Username
        {{ form.username }}
      </label>
      <label>
        Password
        {{ form.password }}
      </label>
      <button class="button primary" type="submit">Sign in</button>
    </form>
  </section>
{% endblock %}
