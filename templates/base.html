{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MemeVault{% endblock %}</title>
  <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
  <link rel="stylesheet" href="{% static 'library/styles.css' %}">
  <script src="{% static 'library/app.js' %}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'library:index' %}">MemeVault</a>
    {% if user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="button ghost" type="submit">Sign out</button>
      </form>
    {% endif %}
  </header>

  <main class="page">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <dialog class="image-modal" data-image-modal>
    <div class="modal-toolbar">
      <a class="button" data-modal-download href="#">Download</a>
      <button class="button" data-modal-copy data-copy-link="" type="button">Copy link</button>
      <button class="icon-button" data-modal-close type="button" aria-label="Close">x</button>
    </div>
    <img data-modal-image alt="">
  </dialog>
</body>
</html>
